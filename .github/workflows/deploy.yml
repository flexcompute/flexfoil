name: Deploy FlexFoil Docs to foil.flexcompute.com/docs

on:
  push:
    branches: [main]
    paths:
      - "docs-site/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      AWS_REGION: us-east-1
      AWS_ROLE: ${{ vars.AWS_DEPLOY_ROLE }}
      DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
      S3_BUCKET: ${{ vars.S3_BUCKET }}
      S3_DEPLOY_PATH: /docs
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Install docs dependencies
        working-directory: ./docs-site
        run: npm ci

      - name: Build docs
        working-directory: ./docs-site
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE }}
          role-session-name: FlexFoilDocsDeploy

      - name: Deploy docs to S3
        working-directory: ./docs-site/build
        run: |
          echo "Deploying to s3://${S3_BUCKET}${S3_DEPLOY_PATH}"

          aws s3 rm "s3://${S3_BUCKET}${S3_DEPLOY_PATH}" --recursive

          aws s3 cp . "s3://${S3_BUCKET}${S3_DEPLOY_PATH}" \
            --recursive --exclude "*" --include "*.html" \
            --metadata-directive REPLACE \
            --cache-control 'max-age=0, no-cache, no-store, must-revalidate' \
            --metadata "deploy-sha1=${GITHUB_SHA}"

          aws s3 cp . "s3://${S3_BUCKET}${S3_DEPLOY_PATH}" \
            --recursive --exclude "*" --include "*.json" --include "*.xml" \
            --metadata-directive REPLACE \
            --cache-control 'max-age=300, must-revalidate' \
            --metadata "deploy-sha1=${GITHUB_SHA}"

          aws s3 cp . "s3://${S3_BUCKET}${S3_DEPLOY_PATH}" \
            --recursive --exclude "*.html" --exclude "*.json" --exclude "*.xml" --exclude "*.map" \
            --cache-control 'max-age=31536000, immutable' \
            --metadata "deploy-sha1=${GITHUB_SHA}"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${DISTRIBUTION_ID}" \
            --paths "/docs/*"

      - name: Deployment Summary
        run: |
          echo "Docs deployed to https://foil.flexcompute.com/docs/"
          echo "CloudFront distribution: ${DISTRIBUTION_ID}"
