        }

        }

            gap: 2rem;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            border-bottom: 1px solid #333;
        }

            align-items: center;
            gap: 0.5rem;
        }
        .control-group label {
            font-size: 0.85rem;
            color: #aaa;
        }

            color: #fff;
            border: 1px solid #444;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
        }
        select:hover {
            border-color: #4facfe;
        }
        .tabs {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            padding: 1rem;
            background: #151515;
        }
        .tab {
            padding: 0.6rem 1.5rem;
            background: #252525;
            border: 1px solid #333;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .tab:hover {
            background: #333;
        }
        .tab.active {
            background: #4facfe;
            color: #000;
            border-color: #4facfe;
        }
        .charts-container {
            padding: 1rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 1rem;
        }
        .chart-wrapper {
            background: #1a1a1a;
            border-radius: 8px;
            padding: 1rem;
            border: 1px solid #333;
        }
        .chart {
            width: 100%;
            height: 450px;
        }
        .stats {
            background: #1a1a1a;
            margin: 1rem;
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid #333;
        }
        .stats h3 {
            margin-bottom: 1rem;
            color: #4facfe;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }
        .stat-card {
            background: #252525;
            padding: 1rem;
            border-radius: 6px;
            text-align: center;
        }
        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #4facfe;
        }
        .stat-label {
            font-size: 0.8rem;
            color: #888;
            margin-top: 0.25rem;
        }
        .loading {
            text-align: center;
            padding: 4rem;
            color: #888;
        }
    </style>

    function computeErrors(xfoil, rustfoil) {
        if (!xfoil || !rustfoil) return null;
        
        let clErrors = [], cdErrors = [];
        
        for (let i = 0; i < xfoil.alpha.length; i++) {
            const alpha = xfoil.alpha[i];
            const j = rustfoil.alpha.findIndex(a => Math.abs(a - alpha) < 0.1);
            if (j >= 0) {
                clErrors.push(rustfoil.cl[j] - xfoil.cl[i]);
                cdErrors.push(rustfoil.cd[j] - xfoil.cd[i]);
            }
        }
        
        if (clErrors.length === 0) return null;
        
        const clRms = Math.sqrt(clErrors.reduce((s, e) => s + e*e, 0) / clErrors.length);
        const cdRms = Math.sqrt(cdErrors.reduce((s, e) => s + e*e, 0) / cdErrors.length);
        
        return {
            clRms: clRms,
            cdRms: cdRms,
            cdCounts: cdRms * 10000,
            nPoints: clErrors.length
        };
    }

        }
        
        grid.innerHTML = `
            <div class="stat-card">
                <div class="stat-value">${errors.clRms.toFixed(4)}</div>
                <div class="stat-label">Cl RMS Error</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">${errors.cdCounts.toFixed(1)}</div>
                <div class="stat-label">Cd Error (counts)</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">${errors.nPoints}</div>
                <div class="stat-label">Data Points</div>
            </div>
            <div class="stat-card">
                <div class="stat-value">${currentReynolds.replace('Re', '').replace('+', '')}</div>
                <div class="stat-label">Reynolds Number</div>
            </div>
        `;
    }

    function plotSingleCondition() {
        const container = document.getElementById('charts-container');
        const data = comparisonData[currentAirfoil]?.[currentReynolds];
        
        if (!data) {
            container.innerHTML = '<div class="loading">No data available</div>';
            return;
        }
        
        container.innerHTML = `
            <div class="chart-wrapper"><div id="cl-alpha" class="chart"></div></div>
            <div class="chart-wrapper"><div id="cd-alpha" class="chart"></div></div>
            <div class="chart-wrapper"><div id="polar" class="chart"></div></div>
            <div class="chart-wrapper"><div id="ld" class="chart"></div></div>
        `;
        
        // Cl vs Alpha
        Plotly.newPlot('cl-alpha', [
            {
                x: data.xfoil.alpha,
                y: data.xfoil.cl,
                name: 'XFOIL',
                mode: 'lines+markers',
                marker: { size: 6, color: xfoilColor },
                line: { color: xfoilColor, width: 2 }
            },
            {
                x: data.rustfoil.alpha,
                y: data.rustfoil.cl,
                name: 'RustFoil',
                mode: 'lines+markers',
                marker: { size: 6, color: rustfoilColor, symbol: 'square' },
                line: { color: rustfoilColor, width: 2, dash: 'dash' }
            }
        ], {
            ...plotLayout,
            title: { text: 'Lift Coefficient', font: { size: 14 } },
            xaxis: { ...plotLayout.xaxis, title: 'α (deg)' },
            yaxis: { ...plotLayout.yaxis, title: 'Cl' }
        }, { responsive: true });
        
        // Cd vs Alpha
        Plotly.newPlot('cd-alpha', [
            {
                x: data.xfoil.alpha,
                y: data.xfoil.cd.map(cd => cd * 10000),
                name: 'XFOIL',
                mode: 'lines+markers',
                marker: { size: 6, color: xfoilColor },
                line: { color: xfoilColor, width: 2 }
            },
            {
                x: data.rustfoil.alpha,
                y: data.rustfoil.cd.map(cd => cd * 10000),
                name: 'RustFoil',
                mode: 'lines+markers',
                marker: { size: 6, color: rustfoilColor, symbol: 'square' },
                line: { color: rustfoilColor, width: 2, dash: 'dash' }
            }
        ], {
            ...plotLayout,
            title: { text: 'Drag Coefficient', font: { size: 14 } },
            xaxis: { ...plotLayout.xaxis, title: 'α (deg)' },
            yaxis: { ...plotLayout.yaxis, title: 'Cd (counts)' }
        }, { responsive: true });
        
        // Drag Polar
        Plotly.newPlot('polar', [
            {
                x: data.xfoil.cd.map(cd => cd * 10000),
                y: data.xfoil.cl,
                name: 'XFOIL',
                mode: 'lines+markers',
                marker: { size: 6, color: xfoilColor },
                line: { color: xfoilColor, width: 2 }
            },
            {
                x: data.rustfoil.cd.map(cd => cd * 10000),
                y: data.rustfoil.cl,
                name: 'RustFoil',
                mode: 'lines+markers',
                marker: { size: 6, color: rustfoilColor, symbol: 'square' },
                line: { color: rustfoilColor, width: 2, dash: 'dash' }
            }
        ], {
            ...plotLayout,
            title: { text: 'Drag Polar', font: { size: 14 } },
            xaxis: { ...plotLayout.xaxis, title: 'Cd (counts)' },
            yaxis: { ...plotLayout.yaxis, title: 'Cl' }
        }, { responsive: true });
        
        // L/D
        const ldXfoil = data.xfoil.cl.map((cl, i) => data.xfoil.cd[i] > 0 ? cl / data.xfoil.cd[i] : 0);
        const ldRustfoil = data.rustfoil.cl.map((cl, i) => data.rustfoil.cd[i] > 0 ? cl / data.rustfoil.cd[i] : 0);
        
        Plotly.newPlot('ld', [
            {
                x: data.xfoil.cl,
                y: ldXfoil,
                name: 'XFOIL',
                mode: 'lines+markers',
                marker: { size: 6, color: xfoilColor },
                line: { color: xfoilColor, width: 2 }
            },
            {
                x: data.rustfoil.cl,
                y: ldRustfoil,
                name: 'RustFoil',
                mode: 'lines+markers',
                marker: { size: 6, color: rustfoilColor, symbol: 'square' },
                line: { color: rustfoilColor, width: 2, dash: 'dash' }
            }
        ], {
            ...plotLayout,
            title: { text: 'Lift-to-Drag Ratio', font: { size: 14 } },
            xaxis: { ...plotLayout.xaxis, title: 'Cl' },
            yaxis: { ...plotLayout.yaxis, title: 'L/D' }
        }, { responsive: true });
    }

    function plotAllReynolds() {
        const container = document.getElementById('charts-container');
        container.innerHTML = `
            <div class="chart-wrapper"><div id="cl-all-re" class="chart"></div></div>
            <div class="chart-wrapper"><div id="cd-all-re" class="chart"></div></div>
        `;
        
        const reynolds = ['Re1e+06', 'Re3e+06', 'Re6e+06'];
        const reLabels = ['1M', '3M', '6M'];
        const reColors = ['#ff6b6b', '#4ecdc4', '#45b7d1'];
        
        const traces = [];
        
        reynolds.forEach((re, idx) => {
            const data = comparisonData[currentAirfoil]?.[re];
            if (!data) return;
            
            traces.push({
                x: data.xfoil.alpha,
                y: data.xfoil.cl,
                name: `XFOIL Re=${reLabels[idx]}`,
                mode: 'lines+markers',
                marker: { size: 5, color: reColors[idx] },
                line: { color: reColors[idx], width: 2 },
                legendgroup: `re${idx}`
            });
            
            traces.push({
                x: data.rustfoil.alpha,
                y: data.rustfoil.cl,
                name: `RustFoil Re=${reLabels[idx]}`,
                mode: 'lines+markers',
                marker: { size: 5, color: reColors[idx], symbol: 'square' },
                line: { color: reColors[idx], width: 2, dash: 'dash' },
                legendgroup: `re${idx}`
            });
        });
        
        Plotly.newPlot('cl-all-re', traces, {
            ...plotLayout,
            title: { text: `${currentAirfoil} - Cl vs Alpha (All Reynolds)`, font: { size: 14 } },
            xaxis: { ...plotLayout.xaxis, title: 'α (deg)' },
            yaxis: { ...plotLayout.yaxis, title: 'Cl' }
        }, { responsive: true });
        
        // Cd plot
        const cdTraces = [];
        reynolds.forEach((re, idx) => {
            const data = comparisonData[currentAirfoil]?.[re];
            if (!data) return;
            
            cdTraces.push({
                x: data.xfoil.alpha,
                y: data.xfoil.cd.map(cd => cd * 10000),
                name: `XFOIL Re=${reLabels[idx]}`,
                mode: 'lines+markers',
                marker: { size: 5, color: reColors[idx] },
                line: { color: reColors[idx], width: 2 },
                legendgroup: `re${idx}`,
                showlegend: false
            });
            
            cdTraces.push({
                x: data.rustfoil.alpha,
                y: data.rustfoil.cd.map(cd => cd * 10000),
                name: `RustFoil Re=${reLabels[idx]}`,
                mode: 'lines+markers',
                marker: { size: 5, color: reColors[idx], symbol: 'square' },
                line: { color: reColors[idx], width: 2, dash: 'dash' },
                legendgroup: `re${idx}`,
                showlegend: false
            });
        });
        
        Plotly.newPlot('cd-all-re', cdTraces, {
            ...plotLayout,
            title: { text: `${currentAirfoil} - Cd vs Alpha (All Reynolds)`, font: { size: 14 } },
            xaxis: { ...plotLayout.xaxis, title: 'α (deg)' },
            yaxis: { ...plotLayout.yaxis, title: 'Cd (counts)' }
        }, { responsive: true });
    }

    function plotAllAirfoils() {
        const container = document.getElementById('charts-container');
        container.innerHTML = `
            <div class="chart-wrapper"><div id="cl-all-foils" class="chart"></div></div>
            <div class="chart-wrapper"><div id="polar-all-foils" class="chart"></div></div>
        `;
        
        const airfoils = ['NACA 0012', 'NACA 2412', 'NACA 4412'];
        const foilColors = ['#4facfe', '#00f5d4', '#f72585'];
        
        const traces = [];
        
        airfoils.forEach((foil, idx) => {
            const data = comparisonData[foil]?.[currentReynolds];
            if (!data) return;
            
            traces.push({
                x: data.xfoil.alpha,
                y: data.xfoil.cl,
                name: `XFOIL ${foil}`,
                mode: 'lines+markers',
                marker: { size: 5, color: foilColors[idx] },
                line: { color: foilColors[idx], width: 2 },
                legendgroup: `foil${idx}`
            });
            
            traces.push({
                x: data.rustfoil.alpha,
                y: data.rustfoil.cl,
                name: `RustFoil ${foil}`,
                mode: 'lines+markers',
                marker: { size: 5, color: foilColors[idx], symbol: 'square' },
                line: { color: foilColors[idx], width: 2, dash: 'dash' },
                legendgroup: `foil${idx}`
            });
        });
        
        Plotly.newPlot('cl-all-foils', traces, {
            ...plotLayout,
            title: { text: `All Airfoils at ${currentReynolds.replace('Re', 'Re=')}`, font: { size: 14 } },
            xaxis: { ...plotLayout.xaxis, title: 'α (deg)' },
            yaxis: { ...plotLayout.yaxis, title: 'Cl' }
        }, { responsive: true });
        
        // Polar plot
        const polarTraces = [];
        airfoils.forEach((foil, idx) => {
            const data = comparisonData[foil]?.[currentReynolds];
            if (!data) return;
            
            polarTraces.push({
                x: data.xfoil.cd.map(cd => cd * 10000),
                y: data.xfoil.cl,
                name: `XFOIL ${foil}`,
                mode: 'lines+markers',
                marker: { size: 5, color: foilColors[idx] },
                line: { color: foilColors[idx], width: 2 },
                legendgroup: `foil${idx}`,
                showlegend: false
            });
            
            polarTraces.push({
                x: data.rustfoil.cd.map(cd => cd * 10000),
                y: data.rustfoil.cl,
                name: `RustFoil ${foil}`,
                mode: 'lines+markers',
                marker: { size: 5, color: foilColors[idx], symbol: 'square' },
                line: { color: foilColors[idx], width: 2, dash: 'dash' },
                legendgroup: `foil${idx}`,
                showlegend: false
            });
        });
        
        Plotly.newPlot('polar-all-foils', polarTraces, {
            ...plotLayout,
            title: { text: `Drag Polar - All Airfoils`, font: { size: 14 } },
            xaxis: { ...plotLayout.xaxis, title: 'Cd (counts)' },
            yaxis: { ...plotLayout.yaxis, title: 'Cl' }
        }, { responsive: true });
    }

    function updatePlots() {
        updateStats();
        
        switch (currentView) {
            case 'single':
                plotSingleCondition();
                break;
            case 'all-re':
                plotAllReynolds();
                break;
            case 'all-foils':
                plotAllAirfoils();
                break;
        }
    }

    // Event listeners
    document.getElementById('airfoil-select').addEventListener('change', (e) => {
        currentAirfoil = e.target.value;
        updatePlots();
    });

    document.getElementById('reynolds-select').addEventListener('change', (e) => {
        currentReynolds = e.target.value;
        updatePlots();
    });

    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentView = tab.dataset.view;
            updatePlots();
        });
    });

    // Initial render
    updatePlots();
    </script>
</body>
</html>
