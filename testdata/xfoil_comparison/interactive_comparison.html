        function updatePlots() {
            const airfoil = document.getElementById('airfoilSelect').value;
            const re = parseFloat(document.getElementById('reSelect').value);
            
            const match = allData.find(d => d.airfoil === airfoil && d.reynolds === re);
            if (!match) return;
            
            const xfoil = match.xfoil;
            const rustfoil = match.rustfoil;
            
            Plotly.newPlot('clPlot', [
                { x: xfoil.alpha, y: xfoil.cl, mode: 'lines+markers', name: 'XFOIL', line: {color: 'blue', width: 2}, marker: {size: 6} },
                { x: rustfoil.alpha, y: rustfoil.cl, mode: 'lines+markers', name: 'RustFoil', line: {color: 'red', width: 2}, marker: {size: 6} }
            ], { title: 'Cl vs Alpha', xaxis: {title: 'Angle of Attack (deg)'}, yaxis: {title: 'Lift Coefficient'}, legend: {x: 0.02, y: 0.98} });
            
            Plotly.newPlot('cdPlot', [
                { x: xfoil.alpha, y: xfoil.cd.map(c => c * 10000), mode: 'lines+markers', name: 'XFOIL', line: {color: 'blue', width: 2}, marker: {size: 6} },
                { x: rustfoil.alpha, y: rustfoil.cd.map(c => c * 10000), mode: 'lines+markers', name: 'RustFoil', line: {color: 'red', width: 2}, marker: {size: 6} }
            ], { title: 'Cd vs Alpha', xaxis: {title: 'Angle of Attack (deg)'}, yaxis: {title: 'Drag Coefficient (counts)'}, legend: {x: 0.02, y: 0.98} });
            
            Plotly.newPlot('polarPlot', [
                { x: xfoil.cd.map(c => c * 10000), y: xfoil.cl, mode: 'lines+markers', name: 'XFOIL', line: {color: 'blue', width: 2}, marker: {size: 6} },
                { x: rustfoil.cd.map(c => c * 10000), y: rustfoil.cl, mode: 'lines+markers', name: 'RustFoil', line: {color: 'red', width: 2}, marker: {size: 6} }
            ], { title: 'Drag Polar (Cl vs Cd)', xaxis: {title: 'Drag Coefficient (counts)'}, yaxis: {title: 'Lift Coefficient'}, legend: {x: 0.98, y: 0.02, xanchor: 'right'} });
        }
        
        updatePlots();
